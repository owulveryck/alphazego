name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26'

    - name: Build
      run: go build -v ./...

    - name: Test
      run: go test -v -race -coverprofile=coverage.out ./...

    - name: Coverage threshold
      run: |
        # Exclure les packages cmd/ (exécutables sans tests) du calcul de couverture.
        grep -v '/cmd/' coverage.out > coverage_lib.out || cp coverage.out coverage_lib.out
        COVERAGE=$(go tool cover -func=coverage_lib.out | grep total | awk '{print $3}' | sed 's/%//')
        echo "Total coverage: ${COVERAGE}%"
        if [ "$(echo "$COVERAGE < 90" | bc -l)" -eq 1 ]; then
          echo "::error::Coverage ${COVERAGE}% is below 90% threshold"
          exit 1
        fi

    - name: Vet
      run: go vet ./...

    - name: Lint
      uses: golangci/golangci-lint-action@v6
      with:
        version: latest

    - name: Check goimports
      run: |
        go install golang.org/x/tools/cmd/goimports@latest
        diff=$(goimports -l .)
        if [ -n "$diff" ]; then
          echo "::error::Les fichiers suivants nécessitent goimports :"
          echo "$diff"
          exit 1
        fi
